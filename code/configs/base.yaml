# Full-scale configuration for the N x D grid (intended for Colab Pro GPU).
seed: 0
device: cuda            # run_grid falls back to CPU automatically if unavailable

data:
  source: synthetic     # "synthetic" (analytic chairs) or "mesh_dir" (ShapeNet)
  mesh_dir: null        # path to a directory of meshes when source == mesh_dir
  num_points: 30000     # SDF samples per shape
  surface_ratio: 0.9    # fraction sampled near the surface
  sigmas: [0.005, 0.02] # near-surface perturbation std-devs
  num_surface_points: 4096
  mesh_resolution: 64   # marching-cubes res for analytic ground-truth meshes

decoder:
  hidden_dim: 512
  num_layers: 8
  skip_in: [4]
  dropout_prob: 0.2
  use_weight_norm: true
  use_tanh: true
  geometric_init: true   # start as a sphere SDF (IGR/SAL) - avoids collapse
  init_radius: 0.5

stage1:
  num_iters: 4000
  shapes_per_batch: 16
  points_per_shape: 2048
  lr_decoder: 1.0e-3
  lr_codes: 1.0e-3
  clamp_delta: 0.1
  code_init_std: 0.01
  code_reg_lambda: 1.0e-4

gaussian:
  covariance: full      # "full" or "diagonal"
  reg: 1.0e-5

ddpm:
  num_timesteps: 200
  beta_start: 1.0e-4
  beta_end: 0.02
  schedule: cosine
  hidden_dim: 256
  num_layers: 4
  time_embed_dim: 64
  lr: 1.0e-3
  num_iters: 3000
  batch_size: 64

eval:
  num_generated: 50
  num_reference: 50
  surface_points: 2048
  recon_resolution: 64
  iou_resolution: 32
  max_recon_shapes: 20  # cap reconstruction eval for speed on large N

grid:
  N: [10, 50, 150]
  D: [16, 32]
  generators: [gaussian, ddpm]
