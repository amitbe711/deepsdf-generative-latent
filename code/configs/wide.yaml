# Wider study: extend N to 500 and add a GMM as an intermediate generator
# (single Gaussian -> GMM -> DDPM on the minimal-to-expressive spectrum).
# Intended for Colab Pro (L4 / A100) or Databricks GPU. Same code path as base.yaml.
seed: 0
device: cuda            # run_grid falls back to CPU automatically if unavailable

data:
  source: synthetic     # "synthetic" (analytic chairs) or "mesh_dir" (ShapeNet)
  mesh_dir: null
  num_points: 30000
  surface_ratio: 0.9
  sigmas: [0.005, 0.02]
  num_surface_points: 4096
  mesh_resolution: 64

decoder:
  hidden_dim: 512
  num_layers: 8
  skip_in: [4]
  dropout_prob: 0.2
  use_weight_norm: true
  use_tanh: true
  geometric_init: true
  init_radius: 0.5

stage1:
  # Larger N shares a fixed-capacity decoder, so give Stage 1 more iterations
  # and a bigger shape batch to keep reconstruction from bottlenecking the study.
  num_iters: 6000
  shapes_per_batch: 24
  points_per_shape: 2048
  lr_decoder: 1.0e-3
  lr_codes: 1.0e-3
  clamp_delta: 0.1
  code_init_std: 0.01
  code_reg_lambda: 1.0e-4

gaussian:
  covariance: full
  reg: 1.0e-5

gmm:
  num_components: 5           # capped automatically so each has >= min points
  reg: 1.0e-5
  max_iters: 200
  min_points_per_component: 5

ddpm:
  num_timesteps: 200
  beta_start: 1.0e-4
  beta_end: 0.02
  schedule: cosine
  hidden_dim: 256
  num_layers: 4
  time_embed_dim: 64
  lr: 1.0e-3
  num_iters: 3000
  batch_size: 64

eval:
  num_generated: 50
  num_reference: 50
  surface_points: 2048
  recon_resolution: 64
  iou_resolution: 32
  max_recon_shapes: 20

grid:
  N: [10, 50, 150, 300, 500]
  D: [16, 32]
  generators: [gaussian, gmm, ddpm]
